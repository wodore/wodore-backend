name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  DJANGO_ENV: test
  DJANGO_SECRET_KEY: test-secret-key-ci
  DJANGO_TRUSTED_DOMAINS: localhost
  POSTGRES_DB: wodore
  POSTGRES_USER: wodore
  POSTGRES_PASSWORD: wodore
  DJANGO_DATABASE_HOST: localhost
  DJANGO_DATABASE_PORT: 5432
  OIDC_OP_BASE_URL: "https://notset"

permissions:
  pull-requests: write
  checks: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Get project version
        id: version
        run: |
          VERSION=$(grep '^current_version' .bumpversion.cfg | cut -d' ' -f3)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Generate migration cache key
        id: migration-hash
        run: |
          # Hash all migration files to detect schema changes
          MIGRATION_HASH=$(find server/apps -path '*/migrations/*.py' \
            ! -name '__init__.py' \
            -exec md5sum {} \; | sort | md5sum | cut -d' ' -f1)
          echo "hash=${MIGRATION_HASH}" >> "$GITHUB_OUTPUT"
          echo "Migration hash: ${MIGRATION_HASH}"

      - name: Cache PostgreSQL data directory
        id: cache-db
        uses: actions/cache@v5
        with:
          path: /tmp/pgdata
          key: testdb-postgis16-v${{ steps.version.outputs.version }}-${{ steps.migration-hash.outputs.hash }}

      - name: Start PostgreSQL
        run: |
          # If cache hit: reuse existing data; if cache miss: start with empty dir
          if [[ "${{ steps.cache-db.outputs.cache-hit }}" != "true" ]]; then
            rm -rf /tmp/pgdata
            mkdir -p /tmp/pgdata
          fi
          docker run -d \
            --name postgis \
            -e POSTGRES_DB=wodore \
            -e POSTGRES_USER=wodore \
            -e POSTGRES_PASSWORD=wodore \
            -e PGDATA=/var/lib/postgresql/data/pgdata \
            -v /tmp/pgdata:/var/lib/postgresql/data \
            -p 5432:5432 \
            postgis/postgis:16-3.4-alpine \
            -c "listen_addresses=*"
          # Wait for PostgreSQL to be ready
          for i in $(seq 1 30); do
            if docker exec postgis pg_isready -U wodore >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done

      - name: Setup token for Python installation
        run: git config --global url."https://${{ secrets.MY_USERNAME }}:${{ secrets.MY_TOKEN }}@github.com".insteadOf ssh://git@github.com

      - name: Cache GDAL apt packages
        id: cache-gdal
        uses: actions/cache@v5
        with:
          path: ~/apt-cache
          key: apt-gdal-${{ runner.os }}-v${{ steps.version.outputs.version }}

      - name: Install GDAL
        run: |
          mkdir -p ~/apt-cache
          sudo apt-get install -y --no-install-recommends -o Dir::Cache::Archives=$HOME/apt-cache gdal-bin libgdal-dev
          # Fix permissions so actions/cache can save the cache
          sudo chmod -R a+r ~/apt-cache

      - name: Set up the environment
        uses: ./.github/actions/setup-venv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: |
          if [[ "${{ steps.cache-db.outputs.cache-hit }}" != "true" ]]; then
            # Fresh database: create from scratch with all migrations
            uv run pytest --no-header -q --create-db --alluredir allure-results
          else
            # Cached database: reuse existing, --reuse-db is default in pyproject.toml
            uv run pytest --no-header -q --alluredir allure-results
          fi

      - name: Generate Allure report
        if: always()
        run: |
          npx -y allure generate --clean || true

      - name: Post Allure summary
        if: always()
        uses: allure-framework/allure-action@v0.6.6
        with:
          report-directory: "./allure-report"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix PG data dir permissions for caching
        if: always() && steps.cache-db.outputs.cache-hit != 'true'
        run: |
          # Stop PostgreSQL cleanly so data is consistent
          docker stop postgis || true
          # Fix permissions using a plain Alpine container running as root
          # (postgis image entrypoint runs as postgres user, which can't chmod)
          docker run --rm \
            --entrypoint sh \
            -v /tmp/pgdata:/data \
            alpine:3 \
            -c "chmod -R 0777 /data"

name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  DJANGO_ENV: test
  DJANGO_SECRET_KEY: test-secret-key-ci
  DJANGO_TRUSTED_DOMAINS: localhost
  POSTGRES_DB: wodore
  POSTGRES_USER: wodore
  POSTGRES_PASSWORD: wodore
  DJANGO_DATABASE_HOST: localhost
  DJANGO_DATABASE_PORT: 5432
  OIDC_OP_BASE_URL: "https://notset"

permissions:
  pull-requests: write
  checks: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Get project version
        id: version
        run: |
          VERSION=$(grep '^current_version' .bumpversion.cfg | cut -d' ' -f3)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Generate migration cache key
        id: migration-hash
        run: |
          MIGRATION_HASH=$(find server/apps -path '*/migrations/*.py' \
            ! -name '__init__.py' \
            -exec md5sum {} \; | sort | md5sum | cut -d' ' -f1)
          echo "hash=${MIGRATION_HASH}" >> "$GITHUB_OUTPUT"
          echo "Migration hash: ${MIGRATION_HASH}"

      # ── Cache checks (instant, establish cache-hit outputs) ─────────────

      - name: Cache PostgreSQL data directory
        id: cache-db
        uses: actions/cache@v5
        with:
          path: /tmp/pgdata
          key: testdb-postgis16-v${{ steps.version.outputs.version }}-${{ steps.migration-hash.outputs.hash }}

      - name: Cache GDAL installation
        id: cache-gdal
        uses: actions/cache@v5
        with:
          path: ~/gdal-installed
          key: gdal-${{ runner.os }}-v${{ steps.version.outputs.version }}

      - name: Cache Allure (npm)
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: allure-${{ runner.os }}

      # ── Start PostgreSQL + Install GDAL in parallel ─────────────────────
      # PostgreSQL starts as a background process. GDAL apt-get runs in the
      # foreground. Both complete before this step finishes.

      - name: Start PostgreSQL + Install GDAL (parallel)
        run: |
          # --- Start PostgreSQL in background ---
          (
            if [[ "${{ steps.cache-db.outputs.cache-hit }}" != "true" ]]; then
              rm -rf /tmp/pgdata
              mkdir -p /tmp/pgdata
            fi
            docker run -d \
              --name postgis \
              -e POSTGRES_DB=wodore \
              -e POSTGRES_USER=wodore \
              -e POSTGRES_PASSWORD=wodore \
              -e PGDATA=/var/lib/postgresql/data/pgdata \
              -v /tmp/pgdata:/var/lib/postgresql/data \
              -p 5432:5432 \
              postgis/postgis:16-3.4-alpine \
              -c "listen_addresses=*"
            # Wait for PostgreSQL to be ready
            for i in $(seq 1 30); do
              if docker exec postgis pg_isready -U wodore >/dev/null 2>&1; then
                echo "PostgreSQL is ready"
                exit 0
              fi
              sleep 1
            done
            echo "ERROR: PostgreSQL failed to start"
            exit 1
          ) &
          PG_PID=$!

          # --- GDAL: restore from cache or install fresh ---
          if [[ "${{ steps.cache-gdal.outputs.cache-hit }}" == "true" ]]; then
            echo "Restoring GDAL from cache..."
            cd ~/gdal-installed
            sudo find . -type f -exec sh -c 'sudo cp "$1" "/$1"' _ {} \;
          else
            echo "Installing GDAL..."
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev
            # Cache installed files
            grep "install " /var/log/apt/history.log | tail -1 | sed 's/.*install //' | tr ',' '\n' > ~/gdal-packages.txt
            mkdir -p ~/gdal-installed
            while read pkg; do
              pkg=$(echo $pkg | tr -d ' ')
              dpkg -L "$pkg" 2>/dev/null | while read file; do
                if [ -f "$file" ]; then
                  sudo mkdir -p ~/gdal-installed"$(dirname "$file")"
                  sudo cp -a "$file" ~/gdal-installed"$file"
                fi
              done
            done < ~/gdal-packages.txt
            sudo chown -R $USER:$USER ~/gdal-installed
          fi

          # Wait for PostgreSQL background process to finish
          echo "Waiting for PostgreSQL startup to complete..."
          wait $PG_PID

      # ── Setup Python environment ────────────────────────────────────────

      - name: Setup token for Python installation
        run: git config --global url."https://${{ secrets.MY_USERNAME }}:${{ secrets.MY_TOKEN }}@github.com".insteadOf ssh://git@github.com

      - name: Set up the environment
        uses: ./.github/actions/setup-venv
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ── Run tests ───────────────────────────────────────────────────────

      - name: Run tests
        run: |
          if [[ "${{ steps.cache-db.outputs.cache-hit }}" != "true" ]]; then
            uv run pytest --no-header -q --create-db -v --alluredir allure-results --clean-alluredir
          else
            uv run pytest --no-header -q -v --alluredir allure-results --clean-alluredir
          fi

      # ── Report ──────────────────────────────────────────────────────────

      - name: Generate Allure report
        if: always()
        run: |
          npx -y allure generate

      - name: Post Allure summary
        if: always()
        uses: allure-framework/allure-action@v0.6.6
        with:
          report-directory: "./allure-report"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix PG data dir permissions for caching
        if: always() && steps.cache-db.outputs.cache-hit != 'true'
        run: |
          docker stop postgis || true
          docker run --rm \
            --entrypoint sh \
            -v /tmp/pgdata:/data \
            alpine:3 \
            -c "chmod -R 0777 /data"

version: 2
updates:
  # Python/uv dependencies
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "17:00"
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: "-"
    labels:
      - "type:deps"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Ignore major version updates for all packages to reduce noise
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Ignore JavaScript dependencies (npm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
    labels:
      - "type:deps"

  # Ignore JavaScript dependencies (bun)
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
    labels:
      - "type:deps"
